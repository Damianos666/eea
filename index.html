<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ENGEL EA" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#2C2C2C" />
    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>ENGEL expert academy</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        height: 100%;
        background: #EFEFEF;
        overscroll-behavior: none;
      }

      #root { height: 100%; }

      @media (min-width: 769px) {
        html, body { background: #d0d0d0; }
        #root {
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .app-container {
          width: 390px !important;
          height: 90vh !important;
          max-height: 844px !important;
          box-shadow: 0 8px 40px rgba(0,0,0,0.25) !important;
        }
      }

      /* Landscape na telefonie — wypełnij cały ekran */
      @media (max-height: 500px) and (orientation: landscape) {
        #root {
          align-items: stretch;
          justify-content: stretch;
        }
        .app-container {
          width: 100% !important;
          height: 100% !important;
          max-height: none !important;
          box-shadow: none !important;
        }
      }

      @media (max-width: 768px) {
        html, body {
          height: 100%;
          height: -webkit-fill-available;
          height: 100dvh;
        }
        #root {
          height: 100%;
          height: -webkit-fill-available;
          height: 100dvh;
        }
        .app-container {
          height: 100% !important;
          height: 100dvh !important;
        }
        .app-content { -webkit-overflow-scrolling: touch; }
        .tabbar {
          position: fixed !important;
          bottom: 0; left: 0; right: 0;
          padding-bottom: env(safe-area-inset-bottom, 0px);
          z-index: 100;
        }
        .contact-fab {
          position: fixed !important;
          bottom: calc(68px + env(safe-area-inset-bottom, 0px)) !important;
          right: 16px !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Fix: iOS PWA viewport zoom nie resetuje się po powrocie portrait → landscape → portrait -->
    <script>
      (function () {
        var VIEWPORT = 'width=device-width, initial-scale=1.0, viewport-fit=cover';
        var VIEWPORT_LOCKED = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover';

        function resetViewportZoom() {
          var meta = document.querySelector('meta[name="viewport"]');
          if (!meta) return;
          // Chwilowo blokujemy zoom → przeglądarka resetuje skalę
          meta.setAttribute('content', VIEWPORT_LOCKED);
          setTimeout(function () {
            // Przywracamy normalny viewport (pinch-zoom znów działa)
            meta.setAttribute('content', VIEWPORT);
          }, 300);
        }

        // Odpalamy reset PO zakończeniu animacji obrotu (300 ms bufor)
        window.addEventListener('orientationchange', function () {
          setTimeout(resetViewportZoom, 200);
        });

        // Fallback dla przeglądarek bez orientationchange (np. Chrome Desktop resize)
        var lastOrientation = window.innerWidth > window.innerHeight ? 'landscape' : 'portrait';
        window.addEventListener('resize', function () {
          var current = window.innerWidth > window.innerHeight ? 'landscape' : 'portrait';
          if (current !== lastOrientation) {
            lastOrientation = current;
            resetViewportZoom();
          }
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
